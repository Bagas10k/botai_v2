<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin — WA Bot CS</title>
    <!-- Google Fonts & Lucide Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-dark: #09090b;
            --panel-bg: rgba(18, 18, 24, 0.75);
            --border-color: rgba(255, 255, 255, 0.06);
            --primary-color: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.2);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --error-color: #ef4444;
            --radius-lg: 16px;
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle grid background with a radial mask */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 36px 36px;
            background-position: center;
            mask-image: radial-gradient(ellipse at 50% 50%, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 30%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Background blur circles */
        .blur-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            opacity: 0.15;
            pointer-events: none;
        }

        .blur-circle-1 {
            width: 350px;
            height: 350px;
            background: #3b82f6;
            top: 10%;
            left: 15%;
        }

        .blur-circle-2 {
            width: 400px;
            height: 400px;
            background: #8b5cf6;
            bottom: 10%;
            right: 15%;
        }

        /* Glassmorphism Card */
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 48px 36px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.03),
                0 20px 50px rgba(0, 0, 0, 0.4),
                0 0 60px var(--primary-glow);
            z-index: 10;
            text-align: center;
            animation: cardFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-wrapper {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-wrapper i {
            color: #ffffff;
            width: 28px;
            height: 28px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 36px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #e4e4e7;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-secondary);
            width: 18px;
            height: 18px;
            transition: var(--transition-smooth);
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            height: 46px;
            padding: 12px 16px 12px 46px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition-smooth);
        }

        .form-control::placeholder {
            color: #52525b;
        }

        .form-control:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .form-control:focus + i {
            color: var(--primary-color);
        }

        .btn-submit {
            width: 100%;
            height: 46px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
            transition: var(--transition-smooth);
            margin-top: 12px;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error-color);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 12px;
            text-align: left;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 20px;
            }
            .login-card {
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="blur-circle blur-circle-1"></div>
    <div class="blur-circle blur-circle-2"></div>

    <div class="login-card">
        <div class="logo-wrapper">
            <i data-lucide="shield-check"></i>
        </div>
        
        <h2>Dasbor WA Bot CS</h2>
        <p class="subtitle">Silakan masuk menggunakan kredensial admin Anda</p>
        
        <div id="error-box" class="error-banner">
            <i data-lucide="alert-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
            <span id="error-message">Username atau password salah!</span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" class="form-control" placeholder="Masukkan username" required autocomplete="username">
                    <i data-lucide="user"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Masukkan password" required autocomplete="current-password">
                    <i data-lucide="lock"></i>
                </div>
            </div>

            <button type="submit" id="btn-login" class="btn-submit">
                <span>Masuk Ke Dasbor</span>
                <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();

        async function handleLogin(event) {
            event.preventDefault();
            
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorBox = document.getElementById('error-box');
            const errorMessage = document.getElementById('error-message');
            const btnLogin = document.getElementById('btn-login');
            
            // Set loading state
            btnLogin.disabled = true;
            btnLogin.innerHTML = `<span>Memproses...</span>`;
            errorBox.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput.value,
                        password: passwordInput.value
                    })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    // Redirect to dashboard on success
                    window.location.href = '/';
                } else {
                    // Show error banner
                    errorMessage.textContent = data.error || 'Gagal login. Hubungi administrator.';
                    errorBox.style.display = 'flex';
                    // Reset button state
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = `<span>Masuk Ke Dasbor</span><i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>`;
                    lucide.createIcons();
                }
            } catch (err) {
                console.error('Login error:', err);
                errorMessage.textContent = 'Gagal terhubung ke server backend.';
                errorBox.style.display = 'flex';
                // Reset button state
                btnLogin.disabled = false;
                btnLogin.innerHTML = `<span>Masuk Ke Dasbor</span><i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>`;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
